name: OrangeHRM Selenium CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  schedule:
    # Run nightly at 02:00 UTC
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      browser:
        description: 'Browser to run tests on'
        required: false
        default: 'chrome'
        type: choice
        options: [ chrome, firefox ]
      module:
        description: 'Specific module to run (leave blank for all)'
        required: false
        default: ''

jobs:
  selenium-tests:
    name: Run Selenium Tests – ${{ github.event.inputs.browser || 'chrome' }}
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout repository ────────────────────────────────────────────
      - name: Checkout Code
        uses: actions/checkout@v4

      # ── 2. Set up JDK 17 ─────────────────────────────────────────────────
      - name: Set Up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      # ── 3. Install Google Chrome (stable) ─────────────────────────────────
      - name: Install Google Chrome
        run: |
          wget -q -O - https://dl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
          sudo sh -c 'echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" >> /etc/apt/sources.list.d/google-chrome.list'
          sudo apt-get update -qq
          sudo apt-get install -y google-chrome-stable
          google-chrome --version

      # ── 4. Cache Maven dependencies ───────────────────────────────────────
      - name: Cache Maven Dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      # ── 5. Create required output directories ────────────────────────────
      - name: Create Output Directories
        run: |
          mkdir -p reports/screenshots
          mkdir -p logs

      # ── 6. Run Tests with Maven Surefire ─────────────────────────────────
      - name: Run Selenium Tests
        env:
          DISPLAY: ':99'
        run: |
          export DISPLAY=:99
          sudo Xvfb :99 -screen 0 1920x1080x24 &
          sleep 2
          mvn clean test \
            -Dbrowser=${{ github.event.inputs.browser || 'chrome' }} \
            -Dheadless=true \
            -Dmaven.test.failure.ignore=true \
            --no-transfer-progress

      # ── 7. Upload ExtentReports HTML ─────────────────────────────────────
      - name: Upload HTML Test Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: OrangeHRM-Test-Report-${{ github.run_number }}
          path: reports/
          retention-days: 15

      # ── 8. Upload Failure Screenshots ────────────────────────────────────
      - name: Upload Failure Screenshots
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: OrangeHRM-Screenshots-${{ github.run_number }}
          path: reports/screenshots/
          retention-days: 15

      # ── 9. Upload Log Files ───────────────────────────────────────────────
      - name: Upload Logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: OrangeHRM-Logs-${{ github.run_number }}
          path: logs/
          retention-days: 7

      # ── 10. Publish Test Summary ──────────────────────────────────────────
      - name: Publish Test Summary
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: TestNG Results
          path: target/surefire-reports/*.xml
          reporter: java-junit
          fail-on-error: false
