# ============================================================
#   OrangeHRM Selenium Automation Framework - Configuration
# ============================================================

# Application URL
base.url=https://opensource-demo.orangehrmlive.com/web/index.php/auth/login

# Credentials
admin.username=Admin
admin.password=admin123

# Browser Configuration (chrome | firefox | edge)
browser=chrome

# Headless Mode (true | false)
headless=false

# Timeouts (seconds)
implicit.wait=10
explicit.wait=15
page.load.timeout=30

# Screenshot on failure (true | false)
screenshot.on.failure=true

# Reports
reports.path=reports/
screenshot.path=reports/screenshots/

# Test Data
testdata.path=src/test/resources/testdata/

# Retry count for failed tests
retry.count=1
